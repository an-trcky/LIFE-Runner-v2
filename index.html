<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIFE Runner</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --sky: #e0f4ff;
    --sky-mid: #b8e4f9;
    --blue: #3b9edd;
    --blue-dark: #1e7bbf;
    --green: #4cba8b;
    --green-light: #d4f3e7;
    --coral: #ff7259;
    --coral-light: #ffe5e0;
    --yellow: #ffc84a;
    --yellow-light: #fff4d4;
    --purple: #9b7fe8;
    --purple-light: #ede8fb;
    --bg: #f0f8ff;
    --card: #ffffff;
    --text: #2d3a4a;
    --text-light: #7a90a4;
    --border: #d8eaf6;
    --shadow: 0 4px 20px rgba(59,158,221,0.10);
    --radius: 18px;
    --radius-sm: 12px;
  }

- { box-sizing: border-box; margin: 0; padding: 0; }

body {
font-family: ‘Noto Sans JP’, sans-serif;
background: var(–bg);
color: var(–text);
min-height: 100vh;
padding-bottom: 60px;
}

/* ===== HEADER ===== */
.header {
background: linear-gradient(135deg, #3b9edd 0%, #2ec4b6 100%);
padding: 32px 20px 48px;
text-align: center;
position: relative;
overflow: hidden;
}
.header::before {
content: ‘’;
position: absolute;
top: -40px; right: -40px;
width: 200px; height: 200px;
background: rgba(255,255,255,0.10);
border-radius: 50%;
}
.header::after {
content: ‘’;
position: absolute;
bottom: -60px; left: -30px;
width: 160px; height: 160px;
background: rgba(255,255,255,0.08);
border-radius: 50%;
}
.header-emoji {
font-size: 40px;
display: block;
margin-bottom: 8px;
animation: float 3s ease-in-out infinite;
}
@keyframes float {
0%,100% { transform: translateY(0); }
50% { transform: translateY(-6px); }
}
.header h1 {
font-family: ‘Nunito’, sans-serif;
font-weight: 900;
font-size: 32px;
color: white;
letter-spacing: 1px;
}
.header-sub {
color: rgba(255,255,255,0.85);
font-size: 13px;
margin-top: 6px;
}

/* ===== WAVE ===== */
.wave-divider {
background: linear-gradient(135deg, #3b9edd 0%, #2ec4b6 100%);
line-height: 0;
}
.wave-divider svg { display: block; }

/* ===== MAIN LAYOUT ===== */
.main {
max-width: 600px;
margin: 0 auto;
padding: 0 16px;
margin-top: -4px;
}

/* ===== SECTION LABEL ===== */
.section-label {
display: flex;
align-items: center;
gap: 8px;
font-family: ‘Nunito’, sans-serif;
font-weight: 800;
font-size: 15px;
color: var(–blue-dark);
margin: 24px 0 10px;
}
.section-label .dot {
width: 10px; height: 10px;
background: var(–blue);
border-radius: 50%;
flex-shrink: 0;
}

/* ===== CARD ===== */
.card {
background: var(–card);
border-radius: var(–radius);
box-shadow: var(–shadow);
padding: 20px;
margin-bottom: 16px;
border: 1.5px solid var(–border);
transition: transform 0.2s, box-shadow 0.2s;
}
.card:hover {
transform: translateY(-2px);
box-shadow: 0 8px 28px rgba(59,158,221,0.15);
}

.card-title {
font-family: ‘Nunito’, sans-serif;
font-weight: 800;
font-size: 16px;
margin-bottom: 16px;
display: flex;
align-items: center;
gap: 8px;
color: var(–text);
}
.card-title .badge {
background: var(–sky);
color: var(–blue-dark);
font-size: 11px;
font-weight: 700;
padding: 2px 8px;
border-radius: 20px;
}

/* ===== INPUT GROUP ===== */
.input-group {
margin-bottom: 14px;
}
.input-group label {
display: block;
font-size: 12px;
font-weight: 700;
color: var(–text-light);
margin-bottom: 5px;
letter-spacing: 0.3px;
}
.input-group input,
.input-group select {
width: 100%;
padding: 10px 14px;
border: 2px solid var(–border);
border-radius: var(–radius-sm);
font-size: 15px;
font-family: ‘Noto Sans JP’, sans-serif;
color: var(–text);
background: #f8fcff;
transition: border-color 0.2s, box-shadow 0.2s;
outline: none;
}
.input-group input:focus,
.input-group select:focus {
border-color: var(–blue);
box-shadow: 0 0 0 3px rgba(59,158,221,0.15);
background: white;
}

.input-row {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 12px;
}

/* ===== TOGGLE SECTION ===== */
.toggle-header {
display: flex;
align-items: center;
justify-content: space-between;
cursor: pointer;
padding: 14px 18px;
background: var(–sky);
border-radius: var(–radius-sm);
margin-bottom: 0;
border: 2px solid var(–sky-mid);
transition: background 0.2s;
user-select: none;
}
.toggle-header:hover { background: var(–sky-mid); }
.toggle-header .toggle-title {
font-family: ‘Nunito’, sans-serif;
font-weight: 800;
font-size: 15px;
color: var(–blue-dark);
display: flex;
align-items: center;
gap: 8px;
}
.toggle-arrow {
font-size: 18px;
transition: transform 0.3s;
color: var(–blue);
}
.toggle-arrow.open { transform: rotate(180deg); }

.toggle-body {
display: none;
margin-top: 14px;
}
.toggle-body.open { display: block; }

/* ===== ADD BUTTON ===== */
.add-btn {
display: flex;
align-items: center;
gap: 6px;
padding: 10px 16px;
background: white;
border: 2px dashed var(–blue);
border-radius: var(–radius-sm);
color: var(–blue);
font-weight: 700;
font-size: 14px;
cursor: pointer;
width: 100%;
justify-content: center;
transition: background 0.2s, transform 0.1s;
margin-top: 10px;
font-family: ‘Noto Sans JP’, sans-serif;
}
.add-btn:hover { background: var(–sky); }
.add-btn:active { transform: scale(0.97); }

/* ===== ROW ITEM (rate change / prepay / event) ===== */
.row-item {
background: #f8fcff;
border: 1.5px solid var(–border);
border-radius: var(–radius-sm);
padding: 14px;
margin-bottom: 10px;
position: relative;
}
.row-item .delete-btn {
position: absolute;
top: 10px; right: 10px;
background: var(–coral-light);
color: var(–coral);
border: none;
border-radius: 8px;
font-size: 12px;
font-weight: 700;
padding: 4px 10px;
cursor: pointer;
transition: background 0.2s;
font-family: ‘Noto Sans JP’, sans-serif;
}
.row-item .delete-btn:hover { background: #ffcfc8; }

/* ===== HINT TEXT ===== */
.hint {
font-size: 11px;
color: var(–text-light);
margin-top: 4px;
}

/* ===== RUN BUTTON ===== */
.run-btn-wrap {
padding: 8px 0 24px;
text-align: center;
}
#runBtn {
background: linear-gradient(135deg, #3b9edd 0%, #2ec4b6 100%);
color: white;
border: none;
border-radius: 50px;
padding: 18px 48px;
font-family: ‘Nunito’, sans-serif;
font-weight: 900;
font-size: 18px;
cursor: pointer;
box-shadow: 0 6px 24px rgba(59,158,221,0.35);
transition: transform 0.15s, box-shadow 0.15s;
letter-spacing: 0.5px;
}
#runBtn:hover {
transform: translateY(-2px);
box-shadow: 0 10px 30px rgba(59,158,221,0.45);
}
#runBtn:active { transform: scale(0.96); }

/* ===== RESULT SECTION ===== */
#resultSection { display: none; }

.result-header {
text-align: center;
padding: 24px 16px 8px;
}
.result-header h2 {
font-family: ‘Nunito’, sans-serif;
font-weight: 900;
font-size: 22px;
color: var(–blue-dark);
}

/* ===== KPI CARDS ===== */
.kpi-grid {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 12px;
margin-bottom: 16px;
}
.kpi-card {
border-radius: var(–radius);
padding: 18px 16px;
text-align: center;
}
.kpi-card .kpi-label {
font-size: 11px;
font-weight: 700;
opacity: 0.75;
margin-bottom: 6px;
letter-spacing: 0.3px;
}
.kpi-card .kpi-value {
font-family: ‘Nunito’, sans-serif;
font-weight: 900;
font-size: 24px;
line-height: 1;
}
.kpi-card .kpi-unit {
font-size: 13px;
font-weight: 700;
opacity: 0.75;
margin-top: 2px;
}
.kpi-blue { background: var(–sky); color: var(–blue-dark); }
.kpi-green { background: var(–green-light); color: #1e7a55; }
.kpi-coral { background: var(–coral-light); color: #c0392b; }
.kpi-yellow { background: var(–yellow-light); color: #b07a00; }

/* ===== COMMENT ===== */
#commentSection {
background: linear-gradient(135deg, #e8f8f4, #d4f3e7);
border-radius: var(–radius);
padding: 18px 20px;
margin-bottom: 16px;
border: 1.5px solid #a8e6cc;
font-size: 14px;
line-height: 1.7;
color: #1e5a40;
}

/* ===== CANVAS ===== */
#assetChart {
width: 100% !important;
height: auto !important;
border-radius: var(–radius);
background: white;
border: 1.5px solid var(–border);
margin-bottom: 16px;
box-shadow: var(–shadow);
}

/* ===== TABLE ===== */
.table-wrap {
overflow-x: auto;
border-radius: var(–radius);
border: 1.5px solid var(–border);
background: white;
box-shadow: var(–shadow);
margin-bottom: 16px;
}
table {
width: 100%;
border-collapse: collapse;
font-size: 13px;
}
th {
background: var(–sky);
color: var(–blue-dark);
font-weight: 700;
padding: 10px 8px;
text-align: right;
border-bottom: 2px solid var(–sky-mid);
white-space: nowrap;
}
th:first-child { text-align: center; }
td {
padding: 10px 8px;
text-align: right;
border-bottom: 1px solid #eef4fb;
}
td:first-child { text-align: center; font-weight: 700; color: var(–blue-dark); }
tr:nth-child(even):not(.detailRow) { background: #f8fcff; }
tr:hover:not(.detailRow) { background: var(–sky); }
.clickable { cursor: pointer; color: var(–blue); font-size: 16px; }
.detailRow { display: none; background: #f0f8ff; }
.detailRow td {
text-align: left;
font-size: 12px;
line-height: 1.8;
color: var(–text-light);
}

/* ===== NEXT 5 BTN ===== */
#next5Btn {
display: block;
margin: 0 auto 16px;
background: white;
border: 2px solid var(–blue);
color: var(–blue);
border-radius: 50px;
padding: 12px 32px;
font-family: ‘Nunito’, sans-serif;
font-weight: 800;
font-size: 15px;
cursor: pointer;
transition: background 0.2s, transform 0.1s;
}
#next5Btn:hover { background: var(–sky); }
#next5Btn:active { transform: scale(0.97); }

/* ===== SAVE BTN ===== */
#saveBtn {
display: block;
margin: 0 auto 16px;
background: linear-gradient(135deg, var(–green), #2ea87a);
border: none;
color: white;
border-radius: 50px;
padding: 12px 32px;
font-family: ‘Nunito’, sans-serif;
font-weight: 800;
font-size: 15px;
cursor: pointer;
box-shadow: 0 4px 16px rgba(76,186,139,0.3);
transition: transform 0.1s;
}
#saveBtn:active { transform: scale(0.97); }

/* ===== SAVED HISTORY ===== */
.saved-item {
background: #f8fcff;
border: 1.5px solid var(–border);
border-radius: var(–radius-sm);
padding: 14px;
margin-bottom: 10px;
display: flex;
align-items: center;
justify-content: space-between;
gap: 10px;
}
.saved-item .saved-info { flex: 1; }
.saved-item .saved-title {
font-weight: 700;
font-size: 14px;
margin-bottom: 2px;
}
.saved-item .saved-meta {
font-size: 12px;
color: var(–text-light);
}
.saved-item .saved-actions { display: flex; gap: 6px; }
.saved-item button {
padding: 6px 12px;
border-radius: 8px;
border: none;
font-size: 12px;
font-weight: 700;
cursor: pointer;
font-family: ‘Noto Sans JP’, sans-serif;
}
.load-btn { background: var(–sky); color: var(–blue-dark); }
.del-btn { background: var(–coral-light); color: var(–coral); }

/* ===== PHILO ===== */
#philoBtn {
display: block;
margin: 0 auto 16px;
background: linear-gradient(to bottom, #1c2f4a, #12203a);
color: #f5e6a6;
border: 2px solid #bfa84c;
border-radius: 50px;
padding: 12px 32px;
font-family: ‘Noto Sans JP’, sans-serif;
font-weight: 700;
font-size: 14px;
cursor: pointer;
letter-spacing: 1px;
}

#philosophySection {
display: none;
background: linear-gradient(135deg, #1c2f4a, #12203a);
border-radius: var(–radius);
padding: 28px 24px;
text-align: center;
color: #f5e6a6;
font-family: ‘Noto Sans JP’, sans-serif;
font-size: 16px;
line-height: 2.2;
letter-spacing: 0.5px;
border: 2px solid #bfa84c;
margin-bottom: 16px;
}

/* ===== EMPTY SAVED ===== */
.empty-saved {
text-align: center;
color: var(–text-light);
font-size: 13px;
padding: 20px 0;
}

/* ===== ANIMATIONS ===== */
@keyframes fadeIn {
from { opacity: 0; transform: translateY(12px); }
to { opacity: 1; transform: translateY(0); }
}
.fade-in { animation: fadeIn 0.4s ease forwards; }
</style>

</head>

<script>

const runBtn = document.getElementById("runBtn")
const tableContainer = document.getElementById("tableContainer")
const commentSection = document.getElementById("commentSection")
const next5Btn = document.getElementById("next5Btn")
const philoBtn = document.getElementById("philoBtn")
const philosophySection = document.getElementById("philosophySection")
const resultSection = document.getElementById("resultSection")
let assetChart = null
let maxYearDisplay = 10

function toggleSection(id, header) {
  const body = document.getElementById(id)
  const arrow = header.querySelector('.toggle-arrow')
  const isOpen = body.classList.contains('open')
  body.classList.toggle('open', !isOpen)
  if (arrow) arrow.classList.toggle('open', !isOpen)
}

function toggleLoan() { toggleSection('loanContent', document.querySelector('[onclick*="loanContent"]')) }
function toggleEvent() { toggleSection('eventContent', document.querySelector('[onclick*="eventContent"]')) }

function renderSavedHistory() {
  let history = JSON.parse(localStorage.getItem("lifeRunnerSaved")) || []
  let html = ""
  if (history.length === 0) {
    html = '<div class="empty-saved">📭 保存されたシミュレーションはありません</div>'
  }
  history.forEach((h, i) => {
    html += `
      <div class="saved-item">
        <div class="saved-info">
          <div class="saved-title">${h.title}</div>
          <div class="saved-meta">${h.age}歳時点 ｜ 純資産 ${h.net >= 0 ? "+" : ""}${h.net}万円</div>
        </div>
        <div class="saved-actions">
          <button class="load-btn" onclick="loadHistory(${i})">読込</button>
          <button class="del-btn" onclick="deleteHistory(${i})">削除</button>
        </div>
      </div>`
  })
  document.getElementById("savedList").innerHTML = html
}

function loadHistory(i) {
  let history = JSON.parse(localStorage.getItem("lifeRunnerSaved")) || []
  let h = history[i]
  if (!h) return

  // ===== 基本入力復元 =====
  Object.keys(h.inputs).forEach(k => {
    let el = document.getElementById(k)
    if (el) el.value = h.inputs[k]
  })

  // ===== イベント復元 =====
  const eventContainer = document.getElementById("eventList")
  eventContainer.innerHTML = ""
  h.events?.forEach(ev => {
    addEvent()
    let last = eventContainer.lastElementChild
    last.querySelector(".age").value = ev.age
    last.querySelector(".type").value = ev.type
    last.querySelector(".amount").value = ev.amount
    last.querySelector(".note").value = ev.note
  })

  // ===== 金利変動復元 =====
  const rateContainer = document.getElementById("rateChangesContainer")
  rateContainer.innerHTML = ""
  h.rates?.forEach(r => {
    addRateChange()
    let last = rateContainer.lastElementChild
    last.querySelector(".rateAge").value = r.age
    last.querySelector(".rateValue").value = r.rate
  })

  // ===== 繰上げ返済復元 =====
  const prepayContainer = document.getElementById("prepayListContainer")
  prepayContainer.innerHTML = ""
  h.prepays?.forEach(p => {
    addPrepay()
    let last = prepayContainer.lastElementChild
    last.querySelector(".prepayAge").value = p.age
    last.querySelector(".prepayAmount").value = p.amount
  })
}

function deleteHistory(i) {
  let history = JSON.parse(localStorage.getItem("lifeRunnerSaved")) || []
  history.splice(i, 1)
  localStorage.setItem("lifeRunnerSaved", JSON.stringify(history))
  renderSavedHistory()
}

runBtn.addEventListener("click", () => {

      age: r.querySelector(".rateAge").value,

      investmentReturn: document.getElementById("investmentReturn").value,
      emergencyTarget: document.getElementById("emergencyTarget").value,

next5Btn.addEventListener("click", () => {
  maxYearDisplay += 5

function addRateChange() {

  let div = document.createElement("div")
  div.className = "row-item rateChangeRow"
  div.innerHTML = `
    <button class="delete-btn" onclick="this.parentElement.remove()">削除</button>
    <div class="input-row" style="padding-right:60px">
      <div class="input-group"><label>何歳から</label><input type="number" class="rateAge" placeholder="例：40"></div>
      <div class="input-group"><label>金利（%）</label><input type="number" class="rateValue" value="1.2" step="0.01"></div>
    </div>`
  container.appendChild(div)
}

function addPrepay() {
  let container = document.getElementById("prepayListContainer")
  let div = document.createElement("div")
  div.className = "row-item prepayRow"
  div.innerHTML = `
    <button class="delete-btn" onclick="this.parentElement.remove()">削除</button>
    <div class="input-row" style="padding-right:60px">
      <div class="input-group"><label>何歳のとき</label><input type="number" class="prepayAge" value="35"></div>
      <div class="input-group"><label>金額（万円）</label><input type="number" class="prepayAmount" value="100"></div>
    </div>`

function addEvent() {
  let container = document.getElementById("eventList")
  let div = document.createElement("div")
  div.className = "row-item event"
  div.innerHTML = `
    <button class="delete-btn" onclick="this.parentElement.remove()">削除</button>
    <div class="input-row" style="padding-right:60px; margin-bottom:8px">
      <div class="input-group"><label>年齢</label><input type="number" class="age" value="40"></div>
      <div class="input-group">
        <label>種類</label>
        <select class="type">
          <option value="oneExpense">臨時支出</option>
          <option value="oneIncome">臨時収入</option>
          <option value="incomeAdd">収入増加（累積）</option>
          <option value="incomeSet">収入変更（固定）</option>
          <option value="expenseAdd">支出増加（累積）</option>
          <option value="expenseSet">支出変更（固定）</option>
        </select>
      </div>
    </div>
    <div class="input-row">
      <div class="input-group"><label>金額（万円）</label><input type="number" class="amount" value="100"></div>
      <div class="input-group"><label>メモ</label><input type="text" class="note" placeholder="例：子ども大学入学"></div>
    </div>`
  container.appendChild(div)
}

function toggleDetail(id) {
  let row = document.getElementById(id)
  row.style.display = row.style.display === "none" ? "table-row" : "none"
}

function calculateMonthly(loan, rate, months, type) {
  if (rate === 0) return loan / months
  if (type === "equal") return loan * rate / (1 - Math.pow(1 + rate, -months))
  else return loan / months + loan * rate
}

function calculateAndRender() {
  let startAge = Number(document.getElementById("startAge").value)
  let loanStartAge = Number(document.getElementById("loanStartAge").value)
  let income = Number(document.getElementById("income").value)
  let bonusTimes = Number(document.getElementById("bonusTimes").value)
  let bonusAmount = Number(document.getElementById("bonusAmount").value)
  let savings = Number(document.getElementById("savings").value)
  let expenses = Number(document.getElementById("expenses").value)
  let investmentSetting = Number(document.getElementById("investment").value)
  let investmentReturn = Number(document.getElementById("investmentReturn").value) / 100
  let emergencyTarget = Number(document.getElementById("emergencyTarget").value)
  let loanAmount = Number(document.getElementById("loanAmount").value)
  let interestRate = Number(document.getElementById("interestRate").value) / 100
  let loanYears = Number(document.getElementById("loanYears").value)
  let repaymentType = document.getElementById("repaymentType").value

  let events = []
  document.querySelectorAll(".event").forEach(e => {
    events.push({
      age: Number(e.querySelector(".age").value),
      type: e.querySelector(".type").value,
      amount: Number(e.querySelector(".amount").value),
      note: e.querySelector(".note").value
    })
  })

  let bonusMonths = []
  if (bonusTimes > 0) {
    let interval = Math.floor(12 / bonusTimes)
    for (let i = 1; i <= bonusTimes; i++) bonusMonths.push(i * interval)
  }

  let interestChanges = []
  document.querySelectorAll(".rateChangeRow").forEach(row => {
    interestChanges.push({
      age: Number(row.querySelector(".rateAge").value),
      rate: Number(row.querySelector(".rateValue").value) / 100
    })
  })

  let prepayList = []
  document.querySelectorAll(".prepayRow").forEach(row => {
    prepayList.push({
      age: Number(row.querySelector(".prepayAge").value),
      amount: Number(row.querySelector(".prepayAmount").value)
    })
  })

  let cash = savings
  let invested = 0
  let investedPrincipal = 0
  let remainingLoan = loanAmount
  let currentAnnualRate = interestRate
  let pastYears = Math.max(0, startAge - loanStartAge)

  for (let year = 1; year <= pastYears; year++) {
    let currentAge = startAge + (year - pastYears - 1)
    let change = interestChanges.find(c => c.age === currentAge)
    if (change) currentAnnualRate = change.rate
    let monthlyRate = currentAnnualRate / 12
    let remainingMonths = (loanYears - year + 1) * 12
    let monthlyPayment = calculateMonthly(remainingLoan, monthlyRate, remainingMonths, repaymentType)
    for (let month = 1; month <= 12; month++) {
      let interest = remainingLoan * monthlyRate
      let principal = monthlyPayment - interest
      principal = Math.min(principal, remainingLoan)
      remainingLoan -= principal
    }
  }

  let history = []
  let currentIncome = income
  let currentExpenses = expenses

  for (let year = pastYears + 1; year <= loanYears; year++) {
    let currentAge = startAge + (year - pastYears - 1)
    let appliedEvents = []

    events.forEach(ev => {
      if (ev.age === currentAge) {
        const noteText = ev.note ? `（${ev.note}）` : ""
        if (ev.type === "incomeAdd") { currentIncome += ev.amount; appliedEvents.push(`収入＋${ev.amount}${noteText}`) }
        if (ev.type === "incomeSet") { currentIncome = ev.amount; appliedEvents.push(`収入→${ev.amount}${noteText}`) }
        if (ev.type === "expenseAdd") { currentExpenses += ev.amount; appliedEvents.push(`支出＋${ev.amount}${noteText}`) }
        if (ev.type === "expenseSet") { currentExpenses = ev.amount; appliedEvents.push(`支出→${ev.amount}${noteText}`) }
        if (ev.type === "oneIncome") { cash += ev.amount; appliedEvents.push(`臨時収入＋${ev.amount}${noteText}`) }
        if (ev.type === "oneExpense") { cash -= ev.amount; appliedEvents.push(`臨時支出−${ev.amount}${noteText}`) }
      }
    })

    let change = interestChanges.find(c => c.age === currentAge)
    if (change) currentAnnualRate = change.rate
    let monthlyRate = currentAnnualRate / 12
    let remainingMonths = (loanYears - year + 1) * 12
    let monthlyPayment = calculateMonthly(remainingLoan, monthlyRate, remainingMonths, repaymentType)
    let yearlyPrincipal = 0
    let yearlyInterest = 0

    for (let month = 1; month <= 12; month++) {
      cash += currentIncome
      if (bonusMonths.includes(month)) {
        cash += bonusAmount
        let repay = Number(document.getElementById("bonusRepay").value)
        let available = cash - emergencyTarget
        if (repay > 0 && available > 0) {
          let pay = Math.min(repay, remainingLoan, available)
          remainingLoan -= pay; cash -= pay
        }
      }
      cash -= currentExpenses
      let interest = remainingLoan * monthlyRate
      let principal = monthlyPayment - interest
      principal = Math.min(principal, remainingLoan)
      remainingLoan -= principal
      yearlyPrincipal += principal
      yearlyInterest += interest
      cash -= monthlyPayment
      let available = cash - emergencyTarget
      if (available > 0) {
        let investAmount = Math.min(investmentSetting, available)
        cash -= investAmount; invested += investAmount; investedPrincipal += investAmount
      }
      invested *= (1 + investmentReturn / 12)
    }

    prepayList.forEach(p => {
      if (currentAge === p.age) {
        let available = cash - emergencyTarget
        let repay = Math.min(p.amount, remainingLoan, available)
        remainingLoan -= repay; cash -= repay
      }
    })

    let totalAsset = cash + invested
    let prevTotalAsset = history.length > 0 ? history[history.length - 1].totalAsset : null
    let diff = prevTotalAsset !== null ? totalAsset - prevTotalAsset : null

    history.push({
      age: currentAge, cash, invested, investedPrincipal,
      remainingLoan, annualRate: currentAnnualRate, totalAsset, diff,
      yearlyPrincipal, yearlyInterest, events: appliedEvents
    })
  }

  // ===== KPI =====
  let plusYear = history.find(h => Math.round(h.cash + h.invested - h.remainingLoan) >= 0)
  let bottom = history.reduce((min, h) => h.totalAsset < min.totalAsset ? h : min)
  let collapse = history.find(h => h.cash < 0)
  let annualExpense = expenses * 12
  let fireTarget = Math.round(annualExpense / 0.04)
  let lastH = history[history.length - 1]
  let finalNet = Math.round(lastH.cash + lastH.invested - lastH.remainingLoan)

  document.getElementById("kpiGrid").innerHTML = `
    <div class="kpi-card kpi-blue">
      <div class="kpi-label">純資産プラスまで</div>
      <div class="kpi-value">${plusYear ? (plusYear.age - startAge) : "未達"}</div>
      <div class="kpi-unit">${plusYear ? "年" : ""}</div>
    </div>
    <div class="kpi-card kpi-yellow">
      <div class="kpi-label">資産ボトム年齢</div>
      <div class="kpi-value">${bottom.age}</div>
      <div class="kpi-unit">歳</div>
    </div>
    <div class="kpi-card ${finalNet >= 0 ? 'kpi-green' : 'kpi-coral'}">
      <div class="kpi-label">ローン完済時の純資産</div>
      <div class="kpi-value">${(finalNet >= 0 ? "+" : "") + finalNet}</div>
      <div class="kpi-unit">万円</div>
    </div>
    <div class="kpi-card kpi-blue">
      <div class="kpi-label">FIRE目標額</div>
      <div class="kpi-value">${fireTarget}</div>
      <div class="kpi-unit">万円</div>
    </div>`

  window.latestResult = { net: finalNet, age: lastH.age }

  // ===== COMMENT =====
  let text = ""
  if (collapse) text += `⚠️ <b>${collapse.age}歳</b>で現金がマイナスになる可能性があります。支出や投資額を見直してみましょう。<br>`
  else text += `✅ シミュレーション期間中、現金はプラスを維持できそうです！<br>`
  if (plusYear) text += `📈 <b>${plusYear.age}歳</b>（${plusYear.age - startAge}年後）に純資産がプラスに転換します。<br>`
  text += `🎯 FIRE達成には <b>${fireTarget}万円</b> の資産が目標です。`
  commentSection.innerHTML = text

  // ===== TABLE =====
  let tableHTML = '<table><tr><th>年齢</th><th>詳細</th><th>現金</th><th>投資</th><th>残債</th><th>金利%</th><th>純資産</th><th>前年比</th></tr>'
  for (let i = 0; i < Math.min(maxYearDisplay, history.length); i++) {
    let h = history[i]
    let netAsset = Math.round(h.cash + h.invested - h.remainingLoan)
    let diffStr = h.diff !== null ? (h.diff >= 0 ? "+" + Math.round(h.diff) : Math.round(h.diff)) : "-"
    let netColor = netAsset >= 0 ? "color:#1e7a55" : "color:#c0392b"
    tableHTML += `<tr>
      <td>${h.age}</td>
      <td class="clickable" onclick="toggleDetail('detail${i}')">▼</td>
      <td>${Math.round(h.cash)}</td>
      <td>${Math.round(h.invested)}</td>
      <td>${Math.round(h.remainingLoan)}</td>
      <td>${(h.annualRate * 100).toFixed(2)}</td>
      <td style="${netColor};font-weight:700">${netAsset}</td>
      <td>${diffStr}</td>
    </tr>
    <tr id="detail${i}" class="detailRow" style="display:none">
      <td colspan="8">
        <b>🎉 イベント：</b>${h.events.length ? h.events.join("、") : "なし"}<br>
        <b>💹 投資：</b>元本 ${Math.round(h.investedPrincipal)}万円 ／ 運用益 ${Math.round(h.invested - h.investedPrincipal)}万円<br>
        <b>🏠 ローン：</b>年間元本 ${Math.round(h.yearlyPrincipal)}万円 ／ 利息 ${Math.round(h.yearlyInterest)}万円
      </td>
    </tr>`
  }
  tableHTML += '</table>'
  tableContainer.innerHTML = tableHTML

  // ===== CHART =====
  let labels = history.slice(0, maxYearDisplay).map(h => h.age + "歳")
  let cashData = history.slice(0, maxYearDisplay).map(h => Math.round(h.cash))
  let investData = history.slice(0, maxYearDisplay).map(h => Math.round(h.invested))
  let loanData = history.slice(0, maxYearDisplay).map(h => Math.round(h.remainingLoan))
  let netData = history.slice(0, maxYearDisplay).map(h => Math.round(h.cash + h.invested - h.remainingLoan))

  if (assetChart) assetChart.destroy()
  assetChart = new Chart(document.getElementById("assetChart").getContext("2d"), {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: '純資産', data: netData, borderColor: '#3b9edd', backgroundColor: 'rgba(59,158,221,0.1)', borderWidth: 3, tension: 0.4, fill: true, pointRadius: 4 },
        { label: '現金', data: cashData, borderColor: '#4cba8b', backgroundColor: 'transparent', borderWidth: 2, tension: 0.4, pointRadius: 3 },
        { label: '投資', data: investData, borderColor: '#ffc84a', backgroundColor: 'transparent', borderWidth: 2, tension: 0.4, pointRadius: 3 },
        { label: '残債', data: loanData, borderColor: '#ff7259', backgroundColor: 'transparent', borderWidth: 2, borderDash: [6,3], tension: 0.4, pointRadius: 3 }
      ]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { position: 'bottom', labels: { font: { family: 'Noto Sans JP', size: 12 }, padding: 16 } }
      },
      scales: {
        y: { ticks: { font: { family: 'Noto Sans JP', size: 11 } }, grid: { color: '#e8f4ff' } },
        x: { ticks: { font: { family: 'Noto Sans JP', size: 11 } }, grid: { color: '#e8f4ff' } }
      }
    }
  })

  // Show result section
  resultSection.style.display = 'block'
  resultSection.classList.add('fade-in')
  renderSavedHistory()
  setTimeout(() => resultSection.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100)
}

renderSavedHistory()
</script>
